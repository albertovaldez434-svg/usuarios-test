<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Perfil</ion-title>
    </ion-toolbar>
  </ion-header> -->

  <div class="page-container">
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-md="8" offset-md="2" size-lg="6" offset-lg="3">
          <ion-card>
            <ion-card-header>
              <ion-card-title class="ion-text-center">Mi Información</ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <!-- Profile Picture Section -->
              <div class="profile-picture-section ion-text-center ion-margin-bottom">
                <div class="profile-picture-container">
                  @if (!imgSrc) {
                  <div class="profile-picture-placeholder">
                    <ion-icon name="person-circle-outline"></ion-icon>
                  </div>
                  <ion-button fill="solid" color="primary" size="small" class="add-picture-btn"
                    (click)="showPictureSourceOptions()">
                    <ion-icon name="camera-outline" slot="start"></ion-icon>
                    Agregar Imagen
                  </ion-button>
                  } @else {
                  <img [src]="imgSrc" alt="Profile Picture" class="profile-picture" />
                  <ion-button fill="outline" color="primary" size="small" class="change-picture-btn"
                    (click)="showPictureSourceOptions()">
                    <ion-icon name="camera-outline" slot="start"></ion-icon>
                    Cambiar
                  </ion-button>
                  }
                </div>
              </div>

              <!-- User Information Section -->
              <div class="user-info-section ion-margin-top">
                <ion-item>
                  <ion-label position="stacked">Nombre</ion-label>
                  <ion-input [value]="currentUser?.nombre || 'Nombre'" readonly></ion-input>
                </ion-item>
                <ion-item>
                  <ion-label position="stacked">Apellidos</ion-label>
                  <ion-input [value]="currentUser?.apellidos || 'Apellido'" readonly></ion-input>
                </ion-item>
                <ion-item>
                  <ion-label position="stacked">Email</ion-label>
                  <ion-input [value]="currentUser?.email || 'Email@emaple.com'" readonly></ion-input>
                </ion-item>
                <ion-item>
                  <ion-label position="stacked">Telefono</ion-label>
                  <ion-input [value]="currentUser?.telefono || 'Ej: +52 644123456'" readonly></ion-input>
                </ion-item>
              </div>

              <div class="button-section">
                @if (!editingUser) {
                <ion-button fill="outline" color="primary" (click)="editProfile()">
                  Editar Perfil
                </ion-button>
                } @else {
                <ion-button fill="outline" class="button-native" color="secondary" (click)="editingUser = false">
                  Cancelar
                </ion-button>
                <ion-button fill="outline" class="button-native" color="primary" (click)="guardarCambiosEdit()">
                  Guardar Cambios
                </ion-button>
                }
              </div>

            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>

<ion-modal #modalEditInfo>
  <ion-header>
    <ion-toolbar>
      <!-- <ion-title>Modal</ion-title> -->
      <ion-buttons slot="end">
        <ion-button (click)="modalEditInfo.dismiss()">
          <ion-icon name="close-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>
  <!-- //[initialBreakpoint]="0.75" [breakpoints]="[0, 0.25, 0.5, 0.75]" -->
  <ng-template>
    <app-register-form [userData]="currentUser" (formSubmit)="getDataEmitted($event)"></app-register-form>
  </ng-template>
</ion-modal>
