<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Profile</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="8" offset-md="2" size-lg="6" offset-lg="3">
        <ion-card>
          <ion-card-header>
            <ion-card-title class="ion-text-center">Mi Informacion</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <ion-item lines="none">
              <ion-avatar slot="start">
                <!-- <img [src]="currentUser?.avatar || 'assets/default-avatar.png'" alt="Profile Picture" /> -->
              </ion-avatar>
              <ion-label>
                <h2>{{ currentUser?.nombre || 'Nombre(s)' }}</h2>
                <p>{{ currentUser?.apellidos || 'Apellidos' }}</p>
              </ion-label>
            </ion-item>

            <ion-item>
              <ion-label position="stacked">Phone</ion-label>
              <ion-input [value]="currentUser?.email || ''" readonly></ion-input>
            </ion-item>
            <ion-item>
              <ion-label position="stacked">Phone</ion-label>
              <ion-input [value]="currentUser?.telefono || ''" readonly></ion-input>
            </ion-item>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
