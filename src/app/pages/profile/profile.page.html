<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Perfil</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="8" offset-md="2" size-lg="6" offset-lg="3">
        <ion-card>
          <ion-card-header>
            <ion-card-title class="ion-text-center">Mi Información</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <!-- Profile Picture Section -->
            <div class="profile-picture-section ion-text-center ion-margin-bottom">
              <div class="profile-picture-container">
                @if (!imgSrc) {
                  <div class="profile-picture-placeholder">
                    <ion-icon name="person-circle-outline"></ion-icon>
                  </div>
                  <ion-button fill="solid" color="primary" size="small" class="add-picture-btn" (click)="showPictureSourceOptions()">
                    <ion-icon name="camera-outline" slot="start"></ion-icon>
                    Agregar Imagen
                  </ion-button>
                } @else {
                  <img [src]="imgSrc" alt="Profile Picture" class="profile-picture" />
                  <ion-button fill="outline" color="primary" size="small" class="change-picture-btn" (click)="showPictureSourceOptions()">
                    <ion-icon name="camera-outline" slot="start"></ion-icon>
                    Cambiar
                  </ion-button>
                }
              </div>
            </div>

            <!-- User Information Section -->
            <div class="user-info-section ion-margin-top">
              <ion-item lines="none" class="name-item">
                <ion-label>
                  <h2>{{ currentUser?.nombre || 'Nombre(s)' }}</h2>
                  <p>{{ currentUser?.apellidos || 'Apellidos' }}</p>
                </ion-label>
              </ion-item>

              <ion-item>
                <ion-label position="stacked">Email</ion-label>
                <ion-input [value]="currentUser?.email || 'Email@emaple.com'" readonly></ion-input>
              </ion-item>
              <ion-item>
                <ion-label position="stacked">Telefono</ion-label>
                <ion-input [value]="currentUser?.telefono || 'Ej: +52 644123456'" readonly></ion-input>
              </ion-item>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
